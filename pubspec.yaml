name: stillalone
description: A dark romance quote app.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  share_plus: ^7.2.2
  path_provider: ^2.1.5
  saver_gallery: ^3.0.6
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/new_app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/new_app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/new_app_icon.png

